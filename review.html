<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review | 课题组组会记录</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="review">
  <header class="site-header compact">
    <div class="brand">MR</div>
    <div>
      <h1>Review</h1>
      <p class="tagline">会前回顾与任务推进页面</p>
    </div>
    <div class="auth-box" id="authBox">
      <button id="loginBtn" class="btn primary">Google 登录</button>
      <button id="logoutBtn" class="btn ghost hidden">退出</button>
      <div id="userInfo" class="user-info">未登录</div>
    </div>
  </header>

  <nav class="top-nav">
    <a href="index.html">首页总览</a>
    <a href="meetings.html">Meetings</a>
    <a href="review.html" class="active">Review</a>
  </nav>

  <main class="container page-layout">
    <section class="card form-card">
      <div class="section-head">
        <h2>新增或编辑回顾事项</h2>
        <span class="status-pill" id="reviewEditState">新增模式</span>
      </div>

      <form id="reviewForm" class="editor-form">
        <input type="hidden" id="reviewId" />
        <label>
          <span>事项标题</span>
          <input type="text" id="reviewTitle" placeholder="例如：补充跟驰模型提取条件文献" required />
        </label>
        <label>
          <span>负责人</span>
          <input type="text" id="reviewOwner" placeholder="例如：刘芸江" />
        </label>
        <div class="two-col">
          <label>
            <span>截止日期</span>
            <input type="date" id="reviewDeadline" />
          </label>
          <label>
            <span>优先级</span>
            <select id="reviewPriority">
              <option value="高">高</option>
              <option value="中" selected>中</option>
              <option value="低">低</option>
            </select>
          </label>
        </div>
        <div class="two-col">
          <label>
            <span>任务状态</span>
            <select id="reviewStatus">
              <option value="未开始">未开始</option>
              <option value="进行中" selected>进行中</option>
              <option value="已完成">已完成</option>
              <option value="待讨论">待讨论</option>
            </select>
          </label>
          <label>
            <span>关联组会日期</span>
            <input type="date" id="reviewMeetingDate" />
          </label>
        </div>
        <label>
          <span>任务说明</span>
          <textarea id="reviewDescription" rows="5" placeholder="填写任务背景、要求和回顾重点"></textarea>
        </label>
        <label>
          <span>当前进展</span>
          <textarea id="reviewProgress" rows="4" placeholder="填写当前进展情况"></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn primary">保存回顾事项</button>
          <button type="button" class="btn secondary" id="reviewResetBtn">清空</button>
        </div>
      </form>
    </section>

    <section class="card list-card">
      <div class="section-head">
        <h2>回顾事项列表</h2>
        <input type="search" id="reviewSearch" class="search-input" placeholder="搜索标题、负责人、进展、状态" />
      </div>
      <div id="reviewList" class="list-wrap"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
