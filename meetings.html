<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meetings | 课题组组会记录</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="meetings">
  <header class="site-header compact">
    <div class="brand">MR</div>
    <div>
      <h1>Meetings</h1>
      <p class="tagline">组会记录在线协作页面</p>
    </div>
    <div class="auth-box" id="authBox">
      <button id="loginBtn" class="btn primary">Google 登录</button>
      <button id="logoutBtn" class="btn ghost hidden">退出</button>
      <div id="userInfo" class="user-info">未登录</div>
    </div>
  </header>

  <nav class="top-nav">
    <a href="index.html">首页总览</a>
    <a href="meetings.html" class="active">Meetings</a>
    <a href="review.html">Review</a>
  </nav>

  <main class="container page-layout">
    <section class="card form-card">
      <div class="section-head">
        <h2>新增或编辑组会记录</h2>
        <span class="status-pill" id="meetingEditState">新增模式</span>
      </div>

      <form id="meetingForm" class="editor-form">
        <input type="hidden" id="meetingId" />
        <label>
          <span>组会日期</span>
          <input type="date" id="meetingDate" required />
        </label>
        <label>
          <span>组会主题</span>
          <input type="text" id="meetingTitle" placeholder="例如：自动驾驶文献梳理与阶段汇报" required />
        </label>
        <label>
          <span>参会人员</span>
          <input type="text" id="meetingMembers" placeholder="例如：闫章存老师、田毅、石泱、唐石磊、刘芸江" />
        </label>
        <label>
          <span>讨论内容</span>
          <textarea id="meetingDiscussion" rows="6" placeholder="填写本次讨论的主要内容"></textarea>
        </label>
        <label>
          <span>结论与决定</span>
          <textarea id="meetingDecision" rows="4" placeholder="填写本次形成的结论"></textarea>
        </label>
        <label>
          <span>下一步任务</span>
          <textarea id="meetingNextStep" rows="4" placeholder="填写需要推进的任务"></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="btn primary">保存组会记录</button>
          <button type="button" class="btn secondary" id="meetingResetBtn">清空</button>
        </div>
      </form>
    </section>

    <section class="card list-card">
      <div class="section-head">
        <h2>组会记录列表</h2>
        <input type="search" id="meetingSearch" class="search-input" placeholder="搜索主题、日期、人员、内容" />
      </div>
      <div id="meetingList" class="list-wrap"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
